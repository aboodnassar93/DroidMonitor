name: Android CI
on:
  push:
      branches: [ "main", "master" ]
        workflow_dispatch:
        jobs:
          build:
              runs-on: ubuntu-latest
                  steps:
                      - uses: actions/checkout@v4
                          - name: set up JDK 11
                                uses: actions/setup-java@v4
                                      with:
                                              java-version: '11'
                                                      distribution: 'temurin'
                                                          - name: Download Missing Gradle Wrapper
                                                                run: |
                                                                        mkdir -p gradle/wrapper
                                                                                curl -L https://raw.githubusercontent.com/gradle/gradle/v7.3.3/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
                                                                                    - name: Setup Gradle
                                                                                          uses: gradle/actions/setup-gradle@v3
                                                                                              - name: Build with Gradle
                                                                                                    run: ./gradlew assembleDebug
                                                                                                        - name: Upload APK
                                                                                                              uses: actions/upload-artifact@v4
                                                                                                                    with:
                                                                                                                            name: droidmonitor-apk
                                                                                                                                    path: app/build/outputs/apk/debug/app-debug.apk
                                                                                                                                    
